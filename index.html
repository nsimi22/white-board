<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>WhiteBoard</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div id="app">
    <header id="toolbar">
      <div class="toolbar-group">
        <button id="btn-pen" class="tool-btn active" title="Pen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
          </svg>
        </button>
        <button id="btn-eraser" class="tool-btn" title="Eraser">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/><path d="M6.0001 17.9999l3-3"/>
          </svg>
        </button>
        <button id="btn-rect" class="tool-btn" title="Rectangle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
          </svg>
        </button>
        <button id="btn-ellipse" class="tool-btn" title="Ellipse">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <ellipse cx="12" cy="12" rx="10" ry="6"/>
          </svg>
        </button>
        <button id="btn-line" class="tool-btn" title="Line">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <line x1="5" y1="19" x2="19" y2="5"/>
          </svg>
        </button>
        <button id="btn-text" class="tool-btn" title="Text">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="4 7 4 4 20 4 20 7"/><line x1="9" y1="20" x2="15" y2="20"/>
            <line x1="12" y1="4" x2="12" y2="20"/>
          </svg>
        </button>
      </div>

      <div class="toolbar-group">
        <label class="color-label" title="Stroke color">
          <input type="color" id="color-picker" value="#1a1a2e" />
          <span>Color</span>
        </label>
        <label class="color-label" title="Fill color">
          <input type="color" id="fill-picker" value="#ffffff" />
          <span>Fill</span>
        </label>
        <label class="toggle-label" title="Toggle fill">
          <input type="checkbox" id="fill-toggle" />
          <span>Fill on</span>
        </label>
      </div>

      <div class="toolbar-group">
        <label class="range-label" title="Brush size">
          <span>Size</span>
          <input type="range" id="size-range" min="1" max="60" value="4" />
          <span id="size-display">4</span>
        </label>
        <label class="range-label" title="Opacity">
          <span>Opacity</span>
          <input type="range" id="opacity-range" min="1" max="100" value="100" />
          <span id="opacity-display">100</span>
        </label>
      </div>

      <div class="toolbar-group">
        <button id="btn-undo" class="action-btn" title="Undo (Ctrl+Z)">Undo</button>
        <button id="btn-redo" class="action-btn" title="Redo (Ctrl+Y)">Redo</button>
        <button id="btn-clear" class="action-btn danger" title="Clear canvas">Clear</button>
        <button id="btn-save" class="action-btn" title="Save as PNG">Save PNG</button>
      </div>
    </header>

    <main id="canvas-container">
      <canvas id="canvas"></canvas>
      <canvas id="overlay"></canvas>
      <textarea id="text-input" placeholder="Type and press Enter…"></textarea>
    </main>
  </div>
  <script src="app.js"></script>
</body>
</html>
